<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Capsensfaker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Auth screen -->
  <div id="authOverlay">
    <div class="auth-logo"><div class="auth-logo-dot"></div></div>
    <div class="auth-title">Capsensfaker</div>
    <div class="auth-subtitle">
      Réservé à l'équipe Capsens.<br>
      Connecte-toi avec ton compte <strong>@capsens.eu</strong>.
    </div>
    <button class="btn-google-login" id="btnGoogleLogin" aria-label="Se connecter avec Google">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Se connecter avec Google
    </button>
    <p class="auth-error" id="authError" aria-live="assertive"></p>
  </div>

  <!-- Main content (shown after auth) -->
  <div id="mainContent" style="display:none">

    <!-- Header -->
    <header>
      <div class="header-top">
        <div class="header-brand">
          <div class="brand-dot"></div>
          <span class="brand-name">Capsensfaker</span>
        </div>
        <div class="header-right">
          <button class="btn-settings" id="btnSettings" aria-label="Paramètres" title="Paramètres">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
          </button>
          <span class="version" id="version"></span>
        </div>
      </div>
      <div class="mode-tabs" role="tablist" aria-label="Mode de données">
        <button class="mode-tab" data-mode="pp" role="tab" aria-selected="true" aria-controls="identityView" id="tab-pp">Personne physique</button>
        <button class="mode-tab" data-mode="pm" role="tab" aria-selected="false" aria-controls="identityView" id="tab-pm">Personne morale</button>
        <button class="mode-tab" data-mode="projet" role="tab" aria-selected="false" aria-controls="projectView" id="tab-projet">Projet</button>
        <button class="mode-tab" data-mode="paiement" role="tab" aria-selected="false" aria-controls="paymentView" id="tab-paiement">Paiement</button>
      </div>
    </header>

    <!-- Settings panel -->
    <div id="settingsPanel" class="settings-panel" style="display:none" aria-label="Paramètres">
      <div class="settings-section">
        <div class="settings-title">Onglet par défaut</div>
        <div class="settings-pills" role="radiogroup" aria-label="Onglet par défaut">
          <button class="settings-pill" data-default-tab="pp">PP</button>
          <button class="settings-pill" data-default-tab="pm">PM</button>
          <button class="settings-pill" data-default-tab="projet">Projet</button>
          <button class="settings-pill" data-default-tab="paiement">Paiement</button>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-title">PSP par défaut</div>
        <div class="settings-pills" role="radiogroup" aria-label="PSP par défaut">
          <button class="settings-pill" data-default-psp="stripe">Stripe</button>
          <button class="settings-pill" data-default-psp="lemonway">Lemonway</button>
          <button class="settings-pill" data-default-psp="mangopay">Mangopay</button>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-title">Clé API Gemini</div>
        <div class="settings-key-row">
          <input type="password" class="ai-key-input" id="apiKey" placeholder="AIzaSy…" aria-label="Clé API Gemini" />
          <button class="btn-save-key" id="btnSaveKey">Sauver</button>
        </div>
      </div>
    </div>

    <!-- Identity view (PP + PM) -->
    <div id="identityView" role="tabpanel" aria-labelledby="tab-pp" class="tab-panel">
      <div class="inputs-bar">
        <div class="input-group">
          <label class="input-label" for="alias">Alias</label>
          <input type="text" class="bar-input" id="alias" placeholder="ex : roman" />
        </div>
        <div class="input-sep"></div>
        <div class="input-group">
          <label class="input-label" for="phone">Téléphone</label>
          <input type="text" class="bar-input" id="phone" placeholder="+33 6 12 34 56 78" />
        </div>
        <button class="btn-reset-settings" id="btnResetSettings" aria-label="Effacer alias et téléphone" title="Effacer alias et téléphone">×</button>
      </div>
      <div class="generate-row">
        <button class="btn-generate" id="btnGenerate">Générer une identité</button>
      </div>

      <div class="identity-card" id="identityCard">
        <!-- Skeleton shown until data loads -->
        <div class="skeleton-line" style="width:40%;height:10px;margin-bottom:6px"></div>
        <div class="skeleton-line" style="width:65%;height:18px;margin-bottom:4px"></div>
        <div class="skeleton-line" style="width:55%;height:12px;margin-bottom:10px"></div>
        <div class="skeleton-line" style="width:50%;height:11px;margin-bottom:10px"></div>
        <div style="height:1px;background:var(--grey-light);margin:0 -16px 10px"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 12px">
          <div><div class="skeleton-line" style="width:50%;height:8px;margin-bottom:3px"></div><div class="skeleton-line" style="width:80%;height:12px"></div></div>
          <div><div class="skeleton-line" style="width:50%;height:8px;margin-bottom:3px"></div><div class="skeleton-line" style="width:80%;height:12px"></div></div>
          <div><div class="skeleton-line" style="width:50%;height:8px;margin-bottom:3px"></div><div class="skeleton-line" style="width:80%;height:12px"></div></div>
          <div><div class="skeleton-line" style="width:50%;height:8px;margin-bottom:3px"></div><div class="skeleton-line" style="width:80%;height:12px"></div></div>
        </div>
      </div>

      <div class="actions">
        <button class="btn-fill" id="btnFill">Remplir le formulaire</button>
        <button class="btn-scan" id="btnScan">Analyser</button>
      </div>

      <div class="scan-panel" id="scanPanel" style="display:none">
        <div class="scan-title">Champs détectés</div>
        <div id="scanList"></div>
      </div>
    </div>

    <!-- Project view -->
    <div id="projectView" role="tabpanel" aria-labelledby="tab-projet" class="tab-panel" style="display:none">
      <div class="project-generate-row">
        <div class="project-type-tabs">
          <button class="project-type-btn active" data-ptype="startup">Startup</button>
          <button class="project-type-btn" data-ptype="immobilier">Immobilier</button>
        </div>
        <button class="btn-generate" id="btnRegenProject">Générer un projet</button>
      </div>
      <div class="project-card">
        <div class="project-image-wrap" id="projectImageWrap" style="display:none">
          <img id="projectImg" src="" alt="Image du projet" />
          <div class="project-image-scrim"></div>
        </div>
        <div class="project-card-body">
          <div class="project-card-header">
            <button class="project-ai-btn" id="btnToggleAI" aria-label="Générer avec l'IA"
              data-tooltip="Utilise Gemini pour générer des projets. Configure ta clé API dans les paramètres.">
              ✦ IA
            </button>
          </div>
          <div class="project-name" id="projectName" role="button" tabindex="0" aria-label="Cliquer pour copier le nom"></div>
          <div class="project-desc" id="projectDesc" role="button" tabindex="0" aria-label="Cliquer pour copier la description"></div>
          <button class="btn-random-img" id="btnRandomImg" style="display:none" aria-label="Changer l'image aléatoirement">↻ Photo aléatoire</button>
        </div>
        <!-- AI panel -->
        <div class="ai-panel" id="aiPanel" style="display:none">
          <div id="aiContent"></div>
        </div>
      </div>
    </div>

    <!-- Payment view -->
    <div id="paymentView" role="tabpanel" aria-labelledby="tab-paiement" class="tab-panel" style="display:none">
      <div class="payment-section">
        <div class="payment-section-title">Cartes de test</div>
        <div class="payment-psp-tabs">
          <button class="psp-tab active" data-psp="stripe">Stripe</button>
          <button class="psp-tab" data-psp="lemonway">Lemonway</button>
          <button class="psp-tab" data-psp="mangopay">Mangopay</button>
        </div>
        <input type="text" class="payment-filter" id="cardFilter" placeholder="Filtrer les cartes…" aria-label="Filtrer les cartes de test" />
        <div id="cardList" class="payment-list"></div>
        <div class="payment-common">
          <span class="payment-common-label">Valeurs communes :</span>
          <button class="payment-meta-copy" id="btnCopyCvv" title="Copier CVV" aria-label="Copier CVV 123">CVV 123</button>
          <button class="payment-meta-copy" id="btnCopyExp" title="Copier expiration" aria-label="Copier expiration 12/30">Exp 12/30</button>
        </div>
      </div>

      <div class="payment-section">
        <div class="payment-section-title">IBAN / BIC</div>
        <div id="ibanList" class="payment-list"></div>
      </div>

      <div class="actions">
        <button class="btn-fill" id="btnFillPayment">Remplir le formulaire</button>
      </div>
    </div>

  </div><!-- /mainContent -->

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="faker-data.js"></script>
  <script src="images.js"></script>
  <script src="popup.js"></script>
</body>
</html>
